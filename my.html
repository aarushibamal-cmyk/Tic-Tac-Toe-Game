<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chai aur code</title>
</head>

<body style="background-color: black; color: white;">
    <ul class="language">
        <li>Javascript</li>
    </ul>
</body>
<script>
    function addLangugae(lang) {
        const myLi = document.createElement('li');
        myLi.innerHTML = `${lang}`
        document.querySelector('.language').appendChild(myLi);
    }
    addLangugae("CPP")
    addLangugae("PYTHON")

    function addopti(lang) {
        const myli1 = document.createElement('li');
        myli1.appendChild(document.createTextNode(lang));
        document.querySelector('.language').appendChild(myli1)
    }
    addopti("JAVA")

    // EDIT
    const secondLang = document.querySelector('li:nth-child(2)')
    //  secondLang.innerHTML = "Typescript";
    const newLi = document.createElement('li')
    newLi.textContent = "Typescript"
    secondLang.replaceWith(newLi)

    // EDIT 
    const firstLang = document.querySelector('li:first-child')
    firstLang.outerHTML = '<li>Type</li>'


    // remove
    const lastLang = document.querySelector('li:last-child')
    lastLang.remove()
</script>

</html>
