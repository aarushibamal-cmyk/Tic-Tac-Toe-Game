<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>
    <link rel="stylesheet" href="weather.css">
</head>

<body>
    <div class="container">
        <h1 class="title">Weather App</h1>

        <div class="city-div">
            <input type="text" placeholder="Search City" id="city" value="Hisar">
            <button class="search-btn">🔍</button>
        </div>

        <div class="city-display">
            <h2 class="city-name">New Delhi</h2>

            <img class="weather-icon" src="" alt="Weather Icon" >

            <h1 class="temperature">32°C</h1>

            <p class="description">Clear Sky</p>

            <div class="weather-info">
                <div class="info-card">
                    <h4>Humidity</h4>
                    <p class="humidity">52%</p>
                </div>

                <div class="info-card">
                    <h4>Wind</h4>
                    <p class="wind-speed">12 km/h</p>
                </div>
            </div>
        </div>
    </div>
    <script src="weather.js"></script>
</body>

</html>
