<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Clone</title>
    <link rel="stylesheet" href="clone.css">
</head>

<body>

    <div id="navBar">
        <h1>Amazon Clone</h1>

        <input type="text" placeholder="Search your item" class="input-box">

        <button id="goTo">Go to Cart 🛒</button>
    </div>

    <!-- Products Page -->
    <div id="products"></div>

    <!-- Cart Page -->
    <div id="cart-page" style="display: none;">
        <h1>Your Shopping Cart</h1>

        <div id="cart-items"></div>

        <h2 id="cart-total">Total: ₹0</h2>

        <button id="back-btn">Back to Shopping</button>
    </div>

    <script src="clone.js"></script>
</body>

</html>
