<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess The Number</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Guess The Number</h1>

        <p>Try to guess a number between 1 and 100</p>
        <p>You have only 10 attempts</p>

        <form>
            <input 
                type="number" 
                id="guessField" 
                placeholder="Enter your guess"
                min="1"
                max="100"
                required
            >

            <button type="button" id="submitGuess">
                Submit Guess
            </button>
        </form>

        <div class="result-section">
            <p>
                <strong>Previous Guesses:</strong>
                <span id="previousGuesses"></span>
            </p>

            <p>
                <strong>Attempts Left:</strong>
                <span id="attemptsLeft">10</span>
            </p>

            <h3 id="resultMessage"></h3>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
